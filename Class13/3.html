#The input contains the array. Function totalStringElement(arr) will take the array as parameter and returns number of 
string element present in it 

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total String Elements</title>
</head>
<body>
    <script>
        function totalStringElement(arr) {
            let count = 0;

            for (let i = 0; i < arr.length; i++) {
                if (typeof arr[i] === "string") {
                    count++;
                }
            }

            return count;
        }

       
        const sampleArray = [1, "hello", true, "world", 42, "HR"];
        console.log(totalStringElement(sampleArray)); 
    </script>
</body>
</html>
